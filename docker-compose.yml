services:
  redis:
    image: redis:7-alpine
    container_name: mini-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  agent:
    build: .
    container_name: mini-agent
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # ── 必填: LLM API 配置 ──
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}

      # ── Redis (容器间通信用服务名) ──
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SESSION_TTL=${REDIS_SESSION_TTL:-86400}

      # ── 百度 OCR (可选) ──
      - BAIDU_OCR_API_KEY=${BAIDU_OCR_API_KEY:-}
      - BAIDU_OCR_SECRET_KEY=${BAIDU_OCR_SECRET_KEY:-}

      # ── Agent 配置 ──
      - AGENT_MAX_STEPS=${AGENT_MAX_STEPS:-15}
      - PORT=5000
    volumes:
      - agent_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  agent_data:
    driver: local
